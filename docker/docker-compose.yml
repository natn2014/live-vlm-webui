# ==============================================================================
# Live VLM WebUI - Complete Stack
# ==============================================================================
# Unified docker-compose with multiple VLM backends.
# Choose your backend via profiles (backend-centric design).
#
# Available Backends:
#   - Ollama: Easy local model management (no API keys)
#   - NVIDIA NIM: Production-grade, advanced reasoning (requires NGC API key)
#   - vLLM: High-performance inference (local addition - see below)
#   - SGLang: Complex reasoning (coming soon)
#
# Profiles (Backend + Platform):
#   Ollama:
#     - ollama: PC (x86_64) / DGX Spark (ARM64)
#     - ollama-jetson-thor: Jetson Thor
#     - ollama-jetson-orin: Jetson Orin
#
#   NVIDIA NIM:
#     - nim: PC (x86_64) / DGX Spark (ARM64)
#     - nim-jetson-thor: Jetson Thor
#     - nim-jetson-orin: Jetson Orin (⚠️ Even multi-arch NIM may not work as it expects SBSA)
#
#   vLLM (local addition, tested on DGX Spark GB10):
#     - vllm-backend: PC (x86_64) / DGX Spark (ARM64) - just the vLLM
#       container serving Qwen2.5-VL-7B-Instruct-AWQ on :8000. Use this if
#       you're running this repo's own (customized) live-vlm-webui separately -
#       e.g. `pip install -e .` + `live-vlm-webui --api-base http://localhost:8000/v1
#       --model qwen2.5-vl-7b` - so you keep YOLO trigger mode, the VLM ring,
#       thumbnail/history log, and other local additions.
#     - vllm-full-stack: same vLLM backend + the *stock* upstream
#       ghcr.io/nvidia-ai-iot/live-vlm-webui:latest image. Simplest one-command
#       path, but does NOT include this repo's local customizations.
#       Recommended over Ollama on DGX Spark either way: Ollama forces the
#       vision encoder onto CPU on this GPU (~30-40s/image); vLLM uses the GPU
#       correctly (~0.6-0.7s/image). See README's "Why vLLM instead of Ollama"
#       section.
#
# Usage:
#   # Ollama (PC or DGX Spark)
#   docker compose --profile ollama up
#   docker exec ollama ollama pull llama3.2-vision:11b
#
#   # NVIDIA NIM (PC or DGX Spark)
#   export NGC_API_KEY=<your-key>
#   docker compose --profile nim up
#
#   # vLLM backend only (pairs with this repo's own customized live-vlm-webui)
#   export HF_TOKEN=<your-huggingface-token>
#   docker compose --profile vllm-backend up -d
#
#   # vLLM full stack (backend + stock upstream webui, one command)
#   export HF_TOKEN=<your-huggingface-token>
#   docker compose --profile vllm-full-stack up -d
#
# Access:
#   - Live VLM WebUI: https://localhost:8090
#   - Ollama API: http://localhost:11434/v1
#   - NIM API: http://localhost:8000/v1
#   - vLLM API: http://localhost:8000/v1
# ==============================================================================

services:
  # ============================================================================
  # Ollama Service (shared across all ollama-* profiles)
  # ============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles:
      - ollama
      - ollama-jetson-orin
      - ollama-jetson-thor
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - vlm-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Live VLM WebUI - PC (x86_64) / DGX Spark (ARM64) [Multi-arch]
  # ============================================================================
  live-vlm-webui:
    image: ghcr.io/nvidia-ai-iot/live-vlm-webui:latest
    container_name: live-vlm-webui
    profiles:
      - ollama
    network_mode: host
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]

  # ============================================================================
  # Live VLM WebUI - Jetson Orin
  # ============================================================================
  live-vlm-webui-jetson-orin:
    image: ghcr.io/nvidia-ai-iot/live-vlm-webui:latest-jetson-orin
    container_name: live-vlm-webui
    profiles:
      - ollama-jetson-orin
    network_mode: host
    privileged: true
    volumes:
      - /run/jtop.sock:/run/jtop.sock:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    runtime: nvidia

  # ============================================================================
  # Live VLM WebUI - Jetson Thor
  # ============================================================================
  live-vlm-webui-jetson-thor:
    image: ghcr.io/nvidia-ai-iot/live-vlm-webui:latest-jetson-thor
    container_name: live-vlm-webui
    profiles:
      - ollama-jetson-thor
    network_mode: host
    privileged: true
    volumes:
      - /run/jtop.sock:/run/jtop.sock:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]

  # ============================================================================
  # NVIDIA NIM - Vision Language Models
  # ============================================================================
  # Supports multiple NIM VLM models via environment variables
  # Default: cosmos-reason1-7b (multi-arch: amd64, arm64)
  # Docs: https://docs.nvidia.com/nim/vision-language-models/
  nim:
    image: ${NIM_IMAGE:-nvcr.io/nim/nvidia/cosmos-reason1-7b:1.4.1}
    container_name: ${NIM_CONTAINER_NAME:-nim-cosmos-reason1-7b}
    profiles:
      - nim
      - nim-jetson-orin
      - nim-jetson-thor
    ports:
      - "8000:8000"
    volumes:
      # Cache downloaded NIM models locally
      - ${HOME}/.cache/nim:/opt/nim/.cache
    environment:
      # Required: NGC API Key (get from https://org.ngc.nvidia.com/setup/api-key)
      - NGC_API_KEY=${NGC_API_KEY}
    shm_size: 32gb
    restart: unless-stopped
    networks:
      - vlm-network
    # GPU configuration
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s  # NIM takes time to start

  # ============================================================================
  # Live VLM WebUI (NIM) - PC (x86_64) / DGX Spark (ARM64) [Multi-arch]
  # ============================================================================
  live-vlm-webui-nim:
    image: ghcr.io/nvidia-ai-iot/live-vlm-webui:latest
    container_name: live-vlm-webui
    profiles:
      - nim
    network_mode: host  # Required for WebRTC
    command: >
      python server.py
      --host 0.0.0.0
      --port 8090
      --ssl-cert cert.pem
      --ssl-key key.pem
      --api-base http://localhost:8000/v1
      --model ${NIM_MODEL_NAME:-nvidia/cosmos-reason1-7b}
      --prompt "Describe what you see in this image in one sentence."
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      nim:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]

  # ============================================================================
  # Live VLM WebUI (NIM) - Jetson Orin
  # ============================================================================
  live-vlm-webui-nim-jetson-orin:
    image: ghcr.io/nvidia-ai-iot/live-vlm-webui:latest-jetson-orin
    container_name: live-vlm-webui
    profiles:
      - nim-jetson-orin
    network_mode: host
    privileged: true
    command: >
      python server.py
      --host 0.0.0.0
      --port 8090
      --ssl-cert cert.pem
      --ssl-key key.pem
      --api-base http://localhost:8000/v1
      --model ${NIM_MODEL_NAME:-nvidia/cosmos-reason1-7b}
      --prompt "Describe what you see in this image in one sentence."
    volumes:
      - /run/jtop.sock:/run/jtop.sock:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      nim:
        condition: service_healthy
    runtime: nvidia

  # ============================================================================
  # Live VLM WebUI (NIM) - Jetson Thor
  # ============================================================================
  live-vlm-webui-nim-jetson-thor:
    image: ghcr.io/nvidia-ai-iot/live-vlm-webui:latest-jetson-thor
    container_name: live-vlm-webui
    profiles:
      - nim-jetson-thor
    network_mode: host
    privileged: true
    command: >
      python server.py
      --host 0.0.0.0
      --port 8090
      --ssl-cert cert.pem
      --ssl-key key.pem
      --api-base http://localhost:8000/v1
      --model ${NIM_MODEL_NAME:-nvidia/cosmos-reason1-7b}
      --prompt "Describe what you see in this image in one sentence."
    volumes:
      - /run/jtop.sock:/run/jtop.sock:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      nim:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]

  # ============================================================================
  # vLLM - Qwen2.5-VL-7B-Instruct-AWQ (local addition)
  # ============================================================================
  # Recommended VLM backend on DGX Spark (GB10): unlike Ollama, vLLM correctly
  # uses the GPU for the vision encoder on this hardware. See README's
  # "Why vLLM instead of Ollama on DGX Spark (GB10)" section for details.
  vllm:
    image: vllm/vllm-openai:cu130-nightly
    container_name: vllm-qwen2_5-vl-7b
    profiles:
      - vllm-backend
      - vllm-full-stack
    ports:
      - "8000:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    ipc: host
    command: >
      --model Qwen/Qwen2.5-VL-7B-Instruct-AWQ
      --served-model-name qwen2.5-vl-7b
      --trust-remote-code
      --max-model-len 32768
      --gpu-memory-utilization 0.65
      --max-num-seqs 4
    restart: unless-stopped
    networks:
      - vlm-network
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 600s

  # ============================================================================
  # Live VLM WebUI (vLLM, stock image) - PC (x86_64) / DGX Spark (ARM64)
  # ============================================================================
  # NOTE: this is the unmodified upstream image - it does NOT include this
  # project's local customizations (YOLO trigger mode, VLM processing ring,
  # thumbnail/history log, etc). If you're running the customized version from
  # this repo's source instead, use --profile vllm-backend (not this one) so
  # this stock container is never started, and point your own instance at
  # http://localhost:8000/v1 --model qwen2.5-vl-7b.
  live-vlm-webui-vllm:
    image: ghcr.io/nvidia-ai-iot/live-vlm-webui:latest
    container_name: live-vlm-webui
    profiles:
      - vllm-full-stack
    network_mode: host  # Required for WebRTC
    command: >
      python server.py
      --host 0.0.0.0
      --port 8090
      --ssl-cert cert.pem
      --ssl-key key.pem
      --api-base http://localhost:8000/v1
      --model qwen2.5-vl-7b
      --prompt "Describe what you see in this image in one sentence."
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      vllm:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]

volumes:
  ollama-data:
    driver: local

networks:
  vlm-network:
    driver: bridge

# ==============================================================================
# Quick Start:
# ==============================================================================
# Option 1: Ollama (Easiest)
#   docker compose --profile ollama up -d
#   docker exec ollama ollama pull llama3.2-vision:11b
#
# Option 2: NVIDIA NIM (Advanced)
#   export NGC_API_KEY=<your-key>
#   docker compose --profile nim up -d
#
# Option 3: vLLM backend only (Recommended on DGX Spark - pairs with this
#           repo's own customized live-vlm-webui, run separately via pip)
#   export HF_TOKEN=<your-huggingface-token>
#   docker compose --profile vllm-backend up -d
#
# Option 4: vLLM full stack (backend + stock upstream webui, one command,
#           no local customizations)
#   export HF_TOKEN=<your-huggingface-token>
#   docker compose --profile vllm-full-stack up -d
#
# Access Web UI: https://localhost:8090
#
# Stop services:
#   docker compose down
# ==============================================================================

